<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
    <title>Register</title>
</head>
<body>
    <div class="main">
        <div class="form-card">
            <h1>Register Page</h1>
            <div class="form-container">
                <form method="POST" class="form" id="login-form">
                    <div class="inputs">
                        <input type="text" id="username" name="username" placeholder="Username" required>
                        <input type="text" id="display-name" name="display-name" placeholder="Display Name" required>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <input type="password" id="repassword" name="confirm-password" placeholder="Confirm Password" required>
                        <input type="email" id="email" name="email" placeholder="Email" required>
                    </div>
                    <button id="submit-btn" type="button"><span class="button-text">Register</span></button>
                    <div id="message-area" class="message-area"></div>
                </form>
            </div>
            <div class="login-switch">
                <span>Already have an account?</span>
                <a href="../login/login.html">Login</a>
            </div>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
